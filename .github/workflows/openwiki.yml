name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Check for recent commits on main
        id: recent_commits
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          TOTAL_COUNT=$(git rev-list --count --since="7 days ago" origin/main)
          RELEVANT_COUNT=$(git rev-list --count --since="7 days ago" origin/main -- . ':(exclude)openwiki/**')
          echo "count=$RELEVANT_COUNT" >> "$GITHUB_OUTPUT"
          echo "total_count=$TOTAL_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$RELEVANT_COUNT" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected $RELEVANT_COUNT relevant commit(s) on main in last 7 days (total commits: $TOTAL_COUNT)."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No relevant commits on main in last 7 days (ignoring openwiki/** updates; total commits: $TOTAL_COUNT)."
          fi

      - name: Stop early when no changes
        if: steps.recent_commits.outputs.changed != 'true'
        run: echo "Skipping OpenWiki update because main has no relevant recent commits (openwiki/** only changes are ignored)."

      - name: Set up Node.js
        if: steps.recent_commits.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenWiki
        if: steps.recent_commits.outputs.changed == 'true'
        run: npm install --global openwiki

      - name: Run OpenWiki
        if: steps.recent_commits.outputs.changed == 'true'
        run: openwiki --update --print
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENWIKI_MODEL_ID: z-ai/glm-5.2

      - name: Create OpenWiki update pull request
        if: steps.recent_commits.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: openwiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            This PR was generated by the scheduled OpenWiki workflow.